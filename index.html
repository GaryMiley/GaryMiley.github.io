<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的主页</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #f8f9fa;
  --card-bg: #fff;
  --text: #1a1a1a;
  --text-secondary: #6b7280;
  --border: #e5e7eb;
  --accent: #2563eb;
  --accent-hover: #1d4ed8;
  --shadow: 0 1px 3px rgba(0,0,0,.07);
  --shadow-lg: 0 4px 16px rgba(0,0,0,.1);
  --radius: 10px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(255,255,255,.9);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px; height: 52px;
  display: flex; align-items: center; justify-content: space-between;
}
nav .logo { font-size: 1.1rem; font-weight: 700; color: var(--text); text-decoration: none; }
nav .nav-links { display: flex; gap: 20px; list-style: none; }
nav .nav-links a { color: var(--text-secondary); text-decoration: none; font-size: .85rem; transition: color .2s; }
nav .nav-links a:hover { color: var(--text); }

/* Hero */
.hero {
  text-align: center; padding: 64px 24px 32px;
}
.hero .avatar {
  width: 80px; height: 80px; border-radius: 50%;
  background: linear-gradient(135deg, #2563eb, #7c3aed);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 2rem; color: #fff; margin-bottom: 16px;
  box-shadow: 0 6px 20px rgba(37,99,235,.25);
}
.hero h1 { font-size: 2rem; font-weight: 800; margin-bottom: 4px; letter-spacing: -.02em; }
.hero p { color: var(--text-secondary); font-size: .95rem; }

/* Container */
.container { max-width: 1040px; margin: 0 auto; padding: 0 24px 64px; }

/* Toolbar */
.toolbar {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
}
.toolbar .breadcrumb {
  display: flex; align-items: center; gap: 6px; font-size: .9rem; flex-wrap: wrap;
}
.toolbar .breadcrumb a {
  color: var(--accent); text-decoration: none; cursor: pointer;
}
.toolbar .breadcrumb a:hover { text-decoration: underline; }
.toolbar .breadcrumb span { color: var(--text-secondary); }
.toolbar .actions { display: flex; gap: 8px; flex-wrap: wrap; }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 8px 16px; border: none; border-radius: 7px;
  font-size: .825rem; font-weight: 500; cursor: pointer;
  transition: all .15s; text-decoration: none; white-space: nowrap;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
.btn-outline:hover { background: #f3f4f6; }
.btn-danger { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
.btn-danger:hover { background: #fecaca; }
.btn-warning { background: #f59e0b; color: #fff; }
.btn-warning:hover { background: #d97706; }
.btn-sm { padding: 5px 10px; font-size: .75rem; }
.btn-xs { padding: 3px 8px; font-size: .7rem; border-radius: 5px; }

/* Grid */
.items-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 14px;
}

/* Folder & File cards */
.item-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 16px;
  text-align: center;
  cursor: pointer;
  transition: all .15s;
  position: relative;
}
.item-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-1px); }
.item-card .item-icon { font-size: 2.5rem; margin-bottom: 10px; line-height: 1; }
.item-card .item-name {
  font-size: .825rem; font-weight: 500; word-break: break-all;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.item-card .item-meta { font-size: .7rem; color: var(--text-secondary); margin-top: 4px; }
.item-card .item-actions {
  position: absolute; top: 6px; right: 6px;
  display: flex; gap: 4px; opacity: 0; transition: opacity .15s;
}
.item-card:hover .item-actions { opacity: 1; }

/* Empty state */
.empty-state {
  grid-column: 1/-1; text-align: center; padding: 48px 16px; color: var(--text-secondary);
}
.empty-state .empty-icon { font-size: 3rem; margin-bottom: 12px; }
.empty-state h3 { font-size: 1.1rem; margin-bottom: 4px; color: var(--text); }

/* Modal */
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,.35); backdrop-filter: blur(3px);
  align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--card-bg); border-radius: var(--radius);
  width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto;
  box-shadow: var(--shadow-lg); padding: 28px;
}
.modal h3 { font-size: 1.1rem; margin-bottom: 20px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: .825rem; font-weight: 500; margin-bottom: 5px; }
.form-group input {
  width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 7px;
  font-size: .875rem; font-family: inherit; outline: none; transition: border-color .15s;
}
.form-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,.08); }

.file-upload-zone {
  border: 2px dashed var(--border); border-radius: var(--radius);
  padding: 24px; text-align: center; cursor: pointer; transition: all .15s;
}
.file-upload-zone:hover { border-color: var(--accent); background: #fafbff; }
.file-upload-zone .upload-icon { font-size: 2rem; margin-bottom: 6px; }
.file-upload-zone .upload-text { font-size: .8rem; color: var(--text-secondary); }
.file-upload-zone.has-file { border-style: solid; border-color: #22c55e; background: #f0fdf4; }
.file-upload-zone .file-name { font-size: .85rem; color: #15803d; font-weight: 500; }
.file-upload-zone input[type="file"] { display: none; }

.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

/* Banner */
.publish-banner {
  display: none; background: #fef3c7; border: 1px solid #f59e0b;
  border-radius: var(--radius); padding: 14px 18px; margin-bottom: 20px;
  align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap;
}
.publish-banner.show { display: flex; }
.publish-banner .banner-text { font-size: .825rem; color: #92400e; font-weight: 500; }

.publish-steps {
  display: none; background: #f0fdf4; border: 1px solid #22c55e;
  border-radius: var(--radius); padding: 18px; margin-bottom: 20px;
}
.publish-steps.show { display: block; }
.publish-steps h4 { font-size: .9rem; color: #166534; margin-bottom: 10px; }
.publish-steps ol { margin-left: 18px; color: #166534; font-size: .8rem; line-height: 2; }
.publish-steps code {
  background: #dcfce7; padding: 1px 5px; border-radius: 3px; font-size: .775rem; color: #15803d;
}

/* Toast */
.toast {
  position: fixed; bottom: 20px; right: 20px; z-index: 300;
  background: #1a1a1a; color: #fff; padding: 10px 20px;
  border-radius: 7px; font-size: .825rem;
  transform: translateY(100px); opacity: 0; transition: all .25s;
}
.toast.show { transform: translateY(0); opacity: 1; }

@media (max-width: 640px) {
  .hero h1 { font-size: 1.5rem; }
  .items-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
}
</style>
</head>
<body>

<nav>
  <a href="#" class="logo">czg</a>
  <ul class="nav-links">
    <li><a href="#files">文件</a></li>
  </ul>
</nav>

<section class="hero">
  <div class="avatar">C</div>
  <h1>你好，我是 czg</h1>
  <p>我的工作文件</p>
</section>

<section class="container" id="files">
  <div class="toolbar">
    <div class="breadcrumb" id="breadcrumb"></div>
    <div class="actions">
      <button class="btn btn-outline btn-sm" id="exportBtn" onclick="exportData()" style="display:none">导出 data.json</button>
      <button class="btn btn-outline btn-sm" onclick="openCreateFolder()">+ 新建文件夹</button>
      <button class="btn btn-primary btn-sm" onclick="openUploadFile()">+ 上传文件</button>
    </div>
  </div>

  <div class="publish-banner" id="publishBanner">
    <span class="banner-text">你有未发布的修改</span>
    <button class="btn btn-warning btn-sm" onclick="exportData()">导出 data.json</button>
  </div>

  <div class="publish-steps" id="publishSteps">
    <h4>发布步骤</h4>
    <ol>
      <li>将下载的 <code>data.json</code> 放到项目目录覆盖原文件</li>
      <li>终端运行：<code>git add data.json && git commit -m "update" && git push</code></li>
      <li>等待 1-2 分钟刷新网页</li>
    </ol>
  </div>

  <div class="items-grid" id="itemsGrid"></div>
</section>

<!-- New Folder Modal -->
<div class="modal-overlay" id="folderModal">
  <div class="modal">
    <h3>新建文件夹</h3>
    <div class="form-group">
      <label>文件夹名称</label>
      <input type="text" id="folderName" placeholder="输入文件夹名称">
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline btn-sm" onclick="closeFolderModal()">取消</button>
      <button class="btn btn-primary btn-sm" onclick="createFolder()">创建</button>
    </div>
  </div>
</div>

<!-- Upload File Modal -->
<div class="modal-overlay" id="fileModal">
  <div class="modal">
    <h3 id="fileModalTitle">上传文件</h3>
    <div class="form-group">
      <label>选择文件</label>
      <div class="file-upload-zone" id="fileUploadZone" onclick="document.getElementById('fileInput').click()">
        <div class="upload-placeholder">
          <div class="upload-icon">📤</div>
          <div class="upload-text">点击选择文件</div>
        </div>
        <div class="file-name" id="selectedFileName" style="display:none"></div>
      </div>
      <input type="file" id="fileInput" onchange="handleFileSelect(event)">
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline btn-sm" onclick="closeFileModal()">取消</button>
      <button class="btn btn-primary btn-sm" onclick="uploadFile()" id="uploadBtn" disabled>上传</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// --- Data model ---
// folders: [{ id, name, createdAt }]
// files:   [{ id, folderId, name, type, size, data, createdAt }]
// currentFolderId: null = root

const DRAFT_KEY = 'fs_draft';
const SNAPSHOT_KEY = 'fs_snapshot';

let folders = [];
let files = [];
let currentFolderId = null;
let serverSnapshot = null;
let pendingFile = null;

// --- Persistence ---
function isDirty() {
  const draft = localStorage.getItem(DRAFT_KEY);
  if (!draft) return false;
  return draft !== (serverSnapshot || '[]');
}

function updateBanner() {
  const dirty = isDirty();
  document.getElementById('publishBanner').classList.toggle('show', dirty);
  document.getElementById('exportBtn').style.display = dirty ? '' : 'none';
}

function saveDraft() {
  localStorage.setItem(DRAFT_KEY, JSON.stringify({ folders, files }));
  updateBanner();
}

async function loadData() {
  let server = { folders: [], files: [] };
  try {
    const resp = await fetch('data.json?' + Date.now());
    if (resp.ok) {
      const json = await resp.json();
      if (json && typeof json === 'object') {
        server = { folders: json.folders || [], files: json.files || [] };
      }
    }
  } catch (e) {}

  serverSnapshot = JSON.stringify(server);
  const draft = localStorage.getItem(DRAFT_KEY);

  if (draft && draft !== serverSnapshot) {
    try {
      const d = JSON.parse(draft);
      folders = d.folders || [];
      files = d.files || [];
    } catch (e) {
      folders = server.folders;
      files = server.files;
    }
  } else {
    folders = server.folders;
    files = server.files;
    if (draft === serverSnapshot) localStorage.removeItem(DRAFT_KEY);
  }
}

// --- File type helpers ---
const FILE_TYPES = {
  pdf:  { icon: '📕', label: 'PDF', color: '#ef4444' },
  doc:  { icon: '📝', label: 'Word', color: '#2563eb' },
  docx: { icon: '📝', label: 'Word', color: '#2563eb' },
  xls:  { icon: '📊', label: 'Excel', color: '#22c55e' },
  xlsx: { icon: '📊', label: 'Excel', color: '#22c55e' },
  ppt:  { icon: '📽️', label: 'PPT', color: '#f97316' },
  pptx: { icon: '📽️', label: 'PPT', color: '#f97316' },
  jpg:  { icon: '🖼️', label: '图片', color: '#8b5cf6' },
  jpeg: { icon: '🖼️', label: '图片', color: '#8b5cf6' },
  png:  { icon: '🖼️', label: '图片', color: '#8b5cf6' },
  gif:  { icon: '🖼️', label: '图片', color: '#8b5cf6' },
  webp: { icon: '🖼️', label: '图片', color: '#8b5cf6' },
  svg:  { icon: '🖼️', label: '图片', color: '#8b5cf6' },
  txt:  { icon: '📄', label: '文本', color: '#6b7280' },
  md:   { icon: '📄', label: 'Markdown', color: '#6b7280' },
  zip:  { icon: '📦', label: '压缩包', color: '#a16207' },
  rar:  { icon: '📦', label: '压缩包', color: '#a16207' },
  '7z': { icon: '📦', label: '压缩包', color: '#a16207' },
  mp3:  { icon: '🎵', label: '音频', color: '#ec4899' },
  wav:  { icon: '🎵', label: '音频', color: '#ec4899' },
  mp4:  { icon: '🎬', label: '视频', color: '#14b8a6' },
  cpp:  { icon: '💻', label: '代码', color: '#2563eb' },
  c:    { icon: '💻', label: '代码', color: '#2563eb' },
  py:   { icon: '💻', label: '代码', color: '#2563eb' },
  js:   { icon: '💻', label: '代码', color: '#2563eb' },
  html: { icon: '💻', label: '代码', color: '#2563eb' },
  css:  { icon: '💻', label: '代码', color: '#2563eb' },
  java: { icon: '💻', label: '代码', color: '#2563eb' },
};

function getFileInfo(name) {
  const ext = name.split('.').pop().toLowerCase();
  return FILE_TYPES[ext] || { icon: '📁', label: ext.toUpperCase() || '文件', color: '#6b7280' };
}

function formatSize(bytes) {
  if (!bytes || bytes === 0) return '';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

// --- Rendering ---
function renderBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  let trail = [{ id: null, name: '全部文件' }];
  if (currentFolderId) {
    const folder = folders.find(f => f.id === currentFolderId);
    if (folder) trail.push({ id: folder.id, name: folder.name });
  }
  bc.innerHTML = trail.map((t, i) => {
    if (i < trail.length - 1) {
      return `<a onclick="navigateTo(${t.id ? "'" + t.id + "'" : 'null'})">${escapeHtml(t.name)}</a><span>/</span>`;
    }
    return `<span>${escapeHtml(t.name)}</span>`;
  }).join('');
}

function renderItems() {
  renderBreadcrumb();
  const grid = document.getElementById('itemsGrid');

  const subFolders = folders.filter(f => !f.parentId && currentFolderId === null || f.parentId === currentFolderId);
  const subFiles = files.filter(f => f.folderId === currentFolderId);

  if (subFolders.length === 0 && subFiles.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">📂</div><h3>空文件夹</h3><p>上传文件或新建文件夹</p></div>`;
    return;
  }

  let html = '';

  // Folders first
  subFolders.forEach(f => {
    const fileCount = files.filter(x => x.folderId === f.id).length;
    html += `
      <div class="item-card" onclick="navigateTo('${f.id}')">
        <div class="item-actions">
          <button class="btn btn-danger btn-xs" onclick="event.stopPropagation();deleteFolder('${f.id}')" title="删除">✕</button>
        </div>
        <div class="item-icon">📁</div>
        <div class="item-name">${escapeHtml(f.name)}</div>
        <div class="item-meta">${fileCount} 个文件</div>
      </div>`;
  });

  // Files
  subFiles.forEach(f => {
    const info = getFileInfo(f.name);
    html += `
      <div class="item-card" onclick="downloadFile('${f.id}')">
        <div class="item-actions">
          <button class="btn btn-danger btn-xs" onclick="event.stopPropagation();deleteFile('${f.id}')" title="删除">✕</button>
        </div>
        <div class="item-icon">${info.icon}</div>
        <div class="item-name">${escapeHtml(f.name)}</div>
        <div class="item-meta">${formatSize(f.size)}</div>
      </div>`;
  });

  grid.innerHTML = html;
}

// --- Navigation ---
function navigateTo(folderId) {
  currentFolderId = folderId;
  renderItems();
  document.getElementById('files').scrollIntoView({ behavior: 'smooth' });
}

// --- Folder CRUD ---
function openCreateFolder() {
  document.getElementById('folderName').value = '';
  document.getElementById('folderModal').classList.add('active');
  setTimeout(() => document.getElementById('folderName').focus(), 100);
}

function closeFolderModal() {
  document.getElementById('folderModal').classList.remove('active');
}

function createFolder() {
  const name = document.getElementById('folderName').value.trim();
  if (!name) { showToast('请输入文件夹名称'); return; }
  folders.push({
    id: 'f_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
    name,
    parentId: currentFolderId,
    createdAt: Date.now()
  });
  saveDraft();
  renderItems();
  closeFolderModal();
  showToast('文件夹已创建（草稿）');
}

function deleteFolder(id) {
  if (!confirm('删除文件夹会同时删除其中的文件，确定？')) return;
  folders = folders.filter(f => f.id !== id);
  // Also delete files in subfolders
  const subFolderIds = folders.filter(f => f.parentId === id).map(f => f.id);
  const allIds = [id, ...subFolderIds];
  files = files.filter(f => !allIds.includes(f.folderId));
  folders = folders.filter(f => !allIds.includes(f.parentId) || !allIds.includes(f.id));
  saveDraft();
  renderItems();
  showToast('已删除（草稿）');
}

// --- File CRUD ---
function openUploadFile() {
  pendingFile = null;
  document.getElementById('fileInput').value = '';
  document.getElementById('selectedFileName').style.display = 'none';
  document.getElementById('fileUploadZone').classList.remove('has-file');
  document.getElementById('fileUploadZone').querySelector('.upload-placeholder').style.display = '';
  document.getElementById('uploadBtn').disabled = true;
  document.getElementById('fileModal').classList.add('active');
}

function closeFileModal() {
  document.getElementById('fileModal').classList.remove('active');
  pendingFile = null;
}

function handleFileSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 20 * 1024 * 1024) {
    showToast('文件不能超过 20MB');
    e.target.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = function(ev) {
    pendingFile = {
      name: file.name,
      size: file.size,
      type: file.name.split('.').pop().toLowerCase(),
      data: ev.target.result
    };
    document.getElementById('selectedFileName').textContent = file.name + ' (' + formatSize(file.size) + ')';
    document.getElementById('selectedFileName').style.display = '';
    document.getElementById('fileUploadZone').querySelector('.upload-placeholder').style.display = 'none';
    document.getElementById('fileUploadZone').classList.add('has-file');
    document.getElementById('uploadBtn').disabled = false;
  };
  reader.readAsDataURL(file);
}

function uploadFile() {
  if (!pendingFile) return;
  files.push({
    id: 'fl_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
    folderId: currentFolderId,
    name: pendingFile.name,
    type: pendingFile.type,
    size: pendingFile.size,
    data: pendingFile.data,
    createdAt: Date.now()
  });
  saveDraft();
  renderItems();
  closeFileModal();
  showToast('文件已上传（草稿）');
}

function deleteFile(id) {
  if (!confirm('确定删除这个文件？')) return;
  files = files.filter(f => f.id !== id);
  saveDraft();
  renderItems();
  showToast('文件已删除（草稿）');
}

// Download file from base64 data
function downloadFile(id) {
  const f = files.find(x => x.id === id);
  if (!f || !f.data) return;
  const a = document.createElement('a');
  a.href = f.data;
  a.download = f.name;
  a.click();
}

// --- Export ---
function exportData() {
  const payload = { folders, files };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'data.json';
  a.click();
  URL.revokeObjectURL(url);

  serverSnapshot = JSON.stringify(payload);
  localStorage.setItem(DRAFT_KEY, JSON.stringify(payload));
  updateBanner();
  document.getElementById('publishSteps').classList.add('show');
  showToast('data.json 已下载');
}

// --- Utils ---
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timeout);
  t._timeout = setTimeout(() => t.classList.remove('show'), 2500);
}

// --- Modal close on overlay click ---
document.getElementById('folderModal').addEventListener('click', function(e) {
  if (e.target === this) closeFolderModal();
});
document.getElementById('fileModal').addEventListener('click', function(e) {
  if (e.target === this) closeFileModal();
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') { closeFolderModal(); closeFileModal(); }
});

// --- Init ---
(async function() {
  await loadData();
  renderItems();
  updateBanner();
})();
</script>
</body>
</html>
