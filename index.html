<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的主页</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #f8f9fa;
  --card-bg: #fff;
  --text: #1a1a1a;
  --text-secondary: #6b7280;
  --border: #e5e7eb;
  --accent: #2563eb;
  --accent-hover: #1d4ed8;
  --shadow: 0 1px 3px rgba(0,0,0,.07);
  --shadow-lg: 0 4px 16px rgba(0,0,0,.1);
  --radius: 10px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(255,255,255,.9);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px; height: 52px;
  display: flex; align-items: center; justify-content: space-between;
}
nav .logo { font-size: 1.1rem; font-weight: 700; color: var(--text); text-decoration: none; }
nav .nav-links { display: flex; gap: 20px; list-style: none; }
nav .nav-links a { color: var(--text-secondary); text-decoration: none; font-size: .85rem; }
nav .nav-links a:hover { color: var(--text); }

.hero { text-align: center; padding: 56px 24px 24px; }
.hero .avatar {
  width: 72px; height: 72px; border-radius: 50%;
  background: linear-gradient(135deg, #2563eb, #7c3aed);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 1.75rem; color: #fff; margin-bottom: 14px;
}
.hero h1 { font-size: 1.75rem; font-weight: 800; margin-bottom: 2px; }
.hero p { color: var(--text-secondary); font-size: .9rem; }

.container { max-width: 1040px; margin: 0 auto; padding: 0 24px 56px; }

/* Toolbar */
.toolbar {
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px; margin-bottom: 16px; flex-wrap: wrap;
}
.breadcrumb { display: flex; align-items: center; gap: 4px; font-size: .875rem; flex-wrap: wrap; }
.breadcrumb a { color: var(--accent); text-decoration: none; cursor: pointer; }
.breadcrumb a:hover { text-decoration: underline; }
.breadcrumb span { color: var(--text-secondary); }
.toolbar .actions { display: flex; gap: 8px; flex-wrap: wrap; }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 8px 15px; border: none; border-radius: 7px;
  font-size: .8rem; font-weight: 500; cursor: pointer;
  transition: all .15s; white-space: nowrap;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
.btn-outline:hover { background: #f3f4f6; }
.btn-danger { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
.btn-danger:hover { background: #fecaca; }
.btn-warning { background: #f59e0b; color: #fff; }
.btn-warning:hover { background: #d97706; }
.btn-sm { padding: 5px 10px; font-size: .75rem; }
.btn-xs { padding: 3px 7px; font-size: .7rem; border-radius: 5px; }
.btn:disabled { opacity: .5; cursor: not-allowed; }

/* Grid */
.items-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 14px;
}

.item-card {
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px 16px;
  text-align: center; cursor: pointer; transition: all .15s;
  position: relative; word-break: break-all;
}
.item-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-1px); }
.item-card .item-icon { font-size: 2.5rem; margin-bottom: 10px; line-height: 1; }
.item-card .item-name {
  font-size: .8rem; font-weight: 500;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.item-card .item-meta { font-size: .7rem; color: var(--text-secondary); margin-top: 4px; }
.item-card .item-actions {
  position: absolute; top: 4px; right: 4px;
  display: flex; gap: 3px; opacity: 0; transition: opacity .15s;
}
.item-card:hover .item-actions { opacity: 1; }
.item-card.dragging { opacity: .35; }
.item-card.drop-target { border-color: var(--accent); background: #eff6ff; box-shadow: 0 0 0 3px rgba(37,99,235,.12); }

.empty-state {
  grid-column: 1/-1; text-align: center; padding: 44px 16px; color: var(--text-secondary);
}
.empty-state .empty-icon { font-size: 3rem; margin-bottom: 10px; }
.empty-state h3 { font-size: 1.05rem; margin-bottom: 4px; color: var(--text); }

/* Banner */
.publish-banner {
  display: none; background: #fef3c7; border: 1px solid #f59e0b;
  border-radius: var(--radius); padding: 12px 16px; margin-bottom: 16px;
  align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
}
.publish-banner.show { display: flex; }
.publish-banner .banner-text { font-size: .8rem; color: #92400e; font-weight: 500; }

.publish-steps {
  display: none; background: #f0fdf4; border: 1px solid #22c55e;
  border-radius: var(--radius); padding: 16px; margin-bottom: 16px;
}
.publish-steps.show { display: block; }
.publish-steps h4 { font-size: .875rem; color: #166534; margin-bottom: 8px; }
.publish-steps ol { margin-left: 16px; color: #166534; font-size: .78rem; line-height: 2; }
.publish-steps code {
  background: #dcfce7; padding: 1px 5px; border-radius: 3px; font-size: .75rem; color: #15803d;
}

/* Modal */
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,.35); backdrop-filter: blur(3px);
  align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--card-bg); border-radius: var(--radius);
  width: 100%; max-width: 420px; max-height: 90vh; overflow-y: auto;
  box-shadow: var(--shadow-lg); padding: 26px;
}
.modal h3 { font-size: 1.05rem; margin-bottom: 18px; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: .8rem; font-weight: 500; margin-bottom: 5px; }
.form-group input {
  width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 7px;
  font-size: .85rem; font-family: inherit; outline: none; transition: border-color .15s;
}
.form-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,.08); }

.file-upload-zone {
  border: 2px dashed var(--border); border-radius: var(--radius);
  padding: 22px; text-align: center; cursor: pointer; transition: all .15s;
}
.file-upload-zone:hover { border-color: var(--accent); background: #fafbff; }
.file-upload-zone .upload-icon { font-size: 1.75rem; margin-bottom: 4px; }
.file-upload-zone .upload-text { font-size: .78rem; color: var(--text-secondary); }
.file-upload-zone.drag-over { border-color: var(--accent); background: #eff6ff; }
.file-upload-zone.has-file { border-style: solid; border-color: #22c55e; background: #f0fdf4; }
.file-upload-zone .file-name { font-size: .82rem; color: #15803d; font-weight: 500; }
.file-upload-zone input[type="file"] { display: none; }

.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; }

.toast {
  position: fixed; bottom: 20px; right: 20px; z-index: 300;
  background: #1a1a1a; color: #fff; padding: 10px 18px;
  border-radius: 7px; font-size: .8rem;
  transform: translateY(100px); opacity: 0; transition: all .25s;
}
.toast.show { transform: translateY(0); opacity: 1; }

.drop-overlay {
  display: none; position: fixed; inset: 0; z-index: 500;
  background: rgba(37,99,235,.12); backdrop-filter: blur(2px);
  align-items: center; justify-content: center; pointer-events: none;
}
.drop-overlay.active { display: flex; }
.drop-message {
  background: var(--card-bg); border: 3px dashed var(--accent); border-radius: 16px;
  padding: 40px 60px; text-align: center; font-size: 1.1rem; font-weight: 600;
  color: var(--accent); box-shadow: 0 8px 32px rgba(37,99,235,.15);
}
.drop-message .drop-icon { font-size: 3rem; margin-bottom: 8px; }

.total-size { font-size: .75rem; color: var(--text-secondary); margin-bottom: 12px; }
.total-size.warn { color: #f59e0b; font-weight: 500; }
.total-size.danger { color: #ef4444; font-weight: 500; }

@media (max-width: 640px) {
  .hero h1 { font-size: 1.4rem; }
  .items-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
}
</style>
</head>
<body ondragover="bodyDragOver(event)" ondragenter="bodyDragEnter(event)"
      ondragleave="bodyDragLeave(event)" ondrop="bodyDrop(event)">

<div class="drop-overlay" id="dropOverlay">
  <div class="drop-message">
    <div class="drop-icon">📥</div>
    <div>释放文件以上传</div>
  </div>
</div>

<nav>
  <a href="#" class="logo">czg</a>
  <ul class="nav-links"><li><a href="#files">文件</a></li></ul>
</nav>

<section class="hero">
  <div class="avatar">C</div>
  <h1>你好，我是 czg</h1>
  <p>我的工作文件</p>
</section>

<section class="container" id="files">
  <div class="toolbar">
    <div class="breadcrumb" id="breadcrumb"></div>
    <div class="actions">
      <span class="total-size" id="totalSize"></span>
      <button class="btn btn-outline btn-sm" id="exportBtn" onclick="exportData()" style="display:none">导出 data.json</button>
      <button class="btn btn-outline btn-sm" onclick="openCreateFolder()">+ 新建文件夹</button>
      <button class="btn btn-primary btn-sm" onclick="openUploadFile()">+ 上传文件</button>
    </div>
  </div>

  <div class="publish-banner" id="publishBanner">
    <span class="banner-text">你有未发布的修改</span>
    <button class="btn btn-warning btn-sm" onclick="exportData()">导出</button>
    <button class="btn btn-outline btn-sm" onclick="discardDraft()">清除草稿</button>
  </div>

  <div class="publish-steps" id="publishSteps">
    <h4>发布步骤</h4>
    <ol>
      <li>把下载的 <code>data.json</code> 放到项目根目录，其余文件放到 <code>files/</code></li>
      <li>终端运行：<code>python sync.py && git add -A && git commit -m "update" && git push</code></li>
      <li>等 1-2 分钟刷新网页</li>
    </ol>
  </div>

  <div class="items-grid" id="itemsGrid"
       ondragover="folderDragOver(event)" ondragleave="folderDragLeave(event)"
       ondrop="gridDrop(event)"></div>
</section>

<!-- New Folder Modal -->
<div class="modal-overlay" id="folderModal">
  <div class="modal">
    <h3>新建文件夹</h3>
    <div class="form-group">
      <label>文件夹名称</label>
      <input type="text" id="folderName" placeholder="输入名称">
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline btn-sm" onclick="closeFolderModal()">取消</button>
      <button class="btn btn-primary btn-sm" onclick="createFolder()">创建</button>
    </div>
  </div>
</div>

<!-- Upload File Modal -->
<div class="modal-overlay" id="fileModal">
  <div class="modal">
    <h3>上传文件</h3>
    <div class="form-group">
      <label>选择文件（可多选，单文件 ≤ 20MB）</label>
      <div class="file-upload-zone" id="fileUploadZone"
           onclick="document.getElementById('fileInput').click()"
           ondragover="dragOver(event)" ondragenter="dragEnter(event)"
           ondragleave="dragLeave(event)" ondrop="dropFile(event)">
        <div class="upload-placeholder">
          <div class="upload-icon">📤</div>
          <div class="upload-text">点击选择文件（可多选）</div>
        </div>
        <div class="file-name" id="selectedFileName" style="display:none"></div>
      </div>
      <input type="file" id="fileInput" onchange="handleFileSelect(event)" multiple>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline btn-sm" onclick="closeFileModal()">取消</button>
      <button class="btn btn-primary btn-sm" onclick="uploadFile()" id="uploadBtn" disabled>上传</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// Storage keys
const META_KEY = 'fs_meta';   // {folders, files} — metadata, no base64
const FILE_PREFIX = 'fs_blob_'; // fs_blob_{id} = base64 file content
const SNAP_KEY = 'fs_snapshot';

let folders = [];
let files = [];   // {id, folderId, name, type, size, createdAt} — no data field
let currentFolderId = null;
let serverSnapshot = null;
let pendingFiles = []; // {data, name}


// --- File type icons ---
const FT = {
  pdf:{icon:'📕',label:'PDF'}, doc:{icon:'📝',label:'Word'}, docx:{icon:'📝',label:'Word'},
  xls:{icon:'📊',label:'Excel'}, xlsx:{icon:'📊',label:'Excel'},
  ppt:{icon:'📽️',label:'PPT'}, pptx:{icon:'📽️',label:'PPT'},
  jpg:{icon:'🖼️',label:'图片'}, jpeg:{icon:'🖼️',label:'图片'}, png:{icon:'🖼️',label:'图片'},
  gif:{icon:'🖼️',label:'图片'}, webp:{icon:'🖼️',label:'图片'}, svg:{icon:'🖼️',label:'图片'},
  txt:{icon:'📄',label:'文本'}, md:{icon:'📄',label:'文本'},
  zip:{icon:'📦',label:'压缩包'}, rar:{icon:'📦',label:'压缩包'}, '7z':{icon:'📦',label:'压缩包'},
  mp3:{icon:'🎵',label:'音频'}, wav:{icon:'🎵',label:'音频'},
  mp4:{icon:'🎬',label:'视频'},
  cpp:{icon:'💻',label:'代码'}, c:{icon:'💻',label:'代码'}, py:{icon:'💻',label:'代码'},
  js:{icon:'💻',label:'代码'}, html:{icon:'💻',label:'代码'}, css:{icon:'💻',label:'代码'},
  java:{icon:'💻',label:'代码'},
};

function getFileInfo(name) {
  const ext = name.split('.').pop().toLowerCase();
  return FT[ext] || {icon:'📁',label:ext.toUpperCase()||'文件'};
}

function fmtSize(bytes) {
  if (!bytes) return '';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

function totalDraftSize() {
  let total = 0;
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key && key.startsWith(FILE_PREFIX)) {
      total += localStorage.getItem(key).length * 2; // UTF-16 chars ≈ 2 bytes each
    }
  }
  return total;
}

// --- Persistence ---
function isDirty() {
  const meta = localStorage.getItem(META_KEY);
  if (!meta) return false;
  return meta !== (serverSnapshot || '{}');
}

function updateBanner() {
  const dirty = isDirty();
  document.getElementById('publishBanner').classList.toggle('show', dirty);
  document.getElementById('exportBtn').style.display = dirty ? '' : 'none';

  const total = totalDraftSize();
  const el = document.getElementById('totalSize');
  if (total > 80 * 1024 * 1024) {
    el.textContent = '⚠ 草稿 ' + fmtSize(total) + '（过大！）';
    el.className = 'total-size danger';
  } else if (total > 40 * 1024 * 1024) {
    el.textContent = '草稿 ' + fmtSize(total);
    el.className = 'total-size warn';
  } else if (total > 0) {
    el.textContent = '草稿 ' + fmtSize(total);
    el.className = 'total-size';
  } else {
    el.textContent = '';
    el.className = 'total-size';
  }
}

function saveMeta() {
  localStorage.setItem(META_KEY, JSON.stringify({folders, files}));
  updateBanner();
}

async function loadData() {
  // Load server metadata
  let server = {folders:[], files:[]};
  try {
    const resp = await fetch('data.json?' + Date.now());
    if (resp.ok) {
      const json = await resp.json();
      server = {folders: json.folders || [], files: json.files || []};
    }
  } catch(e) {}

  serverSnapshot = JSON.stringify(server);

  // Check local draft
  const draftMeta = localStorage.getItem(META_KEY);
  if (draftMeta && draftMeta !== serverSnapshot) {
    try {
      const d = JSON.parse(draftMeta);
      folders = d.folders || [];
      files = d.files || [];
      return;
    } catch(e) {}
  }

  // No draft or draft matches server — use server data, clear stale blobs
  folders = server.folders;
  files = [];
  const serverIds = new Set();
  for (const f of server.files) {
    serverIds.add(f.id);
    if (f.data && !localStorage.getItem(FILE_PREFIX + f.id)) {
      localStorage.setItem(FILE_PREFIX + f.id, f.data);
    }
    const {data: _, ...meta} = f;
    files.push(meta);
  }
  serverSnapshot = JSON.stringify({folders, files});

  if (draftMeta === serverSnapshot) {
    for (let i = localStorage.length - 1; i >= 0; i--) {
      const key = localStorage.key(i);
      if (key && key.startsWith(FILE_PREFIX)) {
        const id = key.slice(FILE_PREFIX.length);
        if (serverIds.has(id)) localStorage.removeItem(key);
      }
    }
    localStorage.removeItem(META_KEY);
  }
}

// --- Rendering ---
function renderBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  let trail = [{id:null, name:'全部文件'}];
  if (currentFolderId) {
    const f = folders.find(x => x.id === currentFolderId);
    if (f) trail.push({id:f.id, name:f.name});
  }
  bc.innerHTML = trail.map((t,i) =>
    i < trail.length-1
      ? `<a onclick="navigateTo(${t.id?"'"+t.id+"'":"null"})"
           ondragover="folderDragOver(event)" ondragleave="folderDragLeave(event)"
           ondrop="folderDrop(event, '${t.id || ''}')">${esc(t.name)}</a><span>/</span>`
      : `<span ondragover="folderDragOver(event)" ondragleave="folderDragLeave(event)"
           ondrop="folderDrop(event, '${t.id || ''}')">${esc(t.name)}</span>`
  ).join('');
}

function renderItems() {
  renderBreadcrumb();
  const grid = document.getElementById('itemsGrid');

  const subFolders = folders.filter(f =>
    (f.parentId || null) === (currentFolderId || null)
  );
  const subFiles = files.filter(f => f.folderId === currentFolderId);

  if (!subFolders.length && !subFiles.length) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">📂</div><h3>空文件夹</h3><p>上传文件或新建文件夹</p></div>`;
    return;
  }

  let html = '';

  subFolders.forEach(f => {
    const count = files.filter(x => x.folderId === f.id).length;
    html += `<div class="item-card"
      ondragover="folderDragOver(event)" ondragleave="folderDragLeave(event)"
      ondrop="folderDrop(event, '${f.id}')" onclick="navigateTo('${f.id}')">
      <div class="item-actions"><button class="btn btn-danger btn-xs" onclick="event.stopPropagation();deleteFolder('${f.id}')" draggable="false">✕</button></div>
      <div class="item-icon">📁</div>
      <div class="item-name">${esc(f.name)}</div>
      <div class="item-meta">${count} 个文件</div>
    </div>`;
  });

  subFiles.forEach(f => {
    const info = getFileInfo(f.name);
    const hasLocal = !!localStorage.getItem(FILE_PREFIX + f.id);
    html += `<div class="item-card" draggable="true"
      ondragstart="dragFileStart(event, '${f.id}')" ondragend="dragFileEnd(event)"
      onclick="downloadFile('${f.id}')">
      <div class="item-actions"><button class="btn btn-danger btn-xs" onclick="event.stopPropagation();deleteFile('${f.id}')" draggable="false">✕</button></div>
      <div class="item-icon">${info.icon}</div>
      <div class="item-name">${esc(f.name)}</div>
      <div class="item-meta">${fmtSize(f.size)}${hasLocal ? ' · 草稿' : ''}</div>
    </div>`;
  });

  grid.innerHTML = html;
}

// --- Navigation ---
function navigateTo(folderId) {
  currentFolderId = folderId;
  renderItems();
  document.getElementById('files').scrollIntoView({behavior:'smooth'});
}

// --- Folder CRUD ---
function openCreateFolder() {
  document.getElementById('folderName').value = '';
  document.getElementById('folderModal').classList.add('active');
  setTimeout(() => document.getElementById('folderName').focus(), 100);
}
function closeFolderModal() { document.getElementById('folderModal').classList.remove('active'); }

function createFolder() {
  const name = document.getElementById('folderName').value.trim();
  if (!name) { showToast('请输入文件夹名称'); return; }
  folders.push({
    id: 'f_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6),
    name, parentId: currentFolderId || undefined, createdAt: Date.now()
  });
  saveMeta();
  renderItems();
  closeFolderModal();
  showToast('文件夹已创建（草稿）');
}

function deleteFolder(id) {
  if (!confirm('删除文件夹会同时删除其中的文件，确定？')) return;
  const collect = [id];
  for (let i = 0; i < collect.length; i++) {
    folders.filter(f => f.parentId === collect[i]).forEach(f => collect.push(f.id));
  }
  const fileIds = files.filter(f => collect.includes(f.folderId)).map(f => f.id);
  fileIds.forEach(fid => localStorage.removeItem(FILE_PREFIX + fid));
  files = files.filter(f => !collect.includes(f.folderId));
  folders = folders.filter(f => !collect.includes(f.id) && !collect.includes(f.parentId));
  saveMeta();
  renderItems();
  showToast('已删除（草稿）');
}

// --- File CRUD ---
function openUploadFile() {
  pendingFiles = [];
  document.getElementById('fileInput').value = '';
  document.getElementById('selectedFileName').style.display = 'none';
  document.getElementById('fileUploadZone').classList.remove('has-file');
  document.getElementById('fileUploadZone').querySelector('.upload-placeholder').style.display = '';
  document.getElementById('uploadBtn').disabled = true;
  document.getElementById('fileModal').classList.add('active');
}
function closeFileModal() { document.getElementById('fileModal').classList.remove('active'); pendingFiles = []; }

function handleFileSelect(e) {
  processFiles(e.target.files);
  e.target.value = '';
}

// --- Body-level drag & drop (upload files directly) ---
let bodyDragCounter = 0;

function isFileDrag(e) {
  return e.dataTransfer.types && e.dataTransfer.types.includes('Files');
}

function bodyDragOver(e) {
  if (!isFileDrag(e)) return;
  e.preventDefault();
}

function bodyDragEnter(e) {
  if (!isFileDrag(e)) return;
  e.preventDefault();
  bodyDragCounter++;
  if (bodyDragCounter === 1 && !document.getElementById('fileModal').classList.contains('active')) {
    document.getElementById('dropOverlay').classList.add('active');
  }
}

function bodyDragLeave(e) {
  if (!isFileDrag(e)) return;
  e.preventDefault();
  bodyDragCounter--;
  if (bodyDragCounter <= 0) {
    bodyDragCounter = 0;
    document.getElementById('dropOverlay').classList.remove('active');
  }
}

function bodyDrop(e) {
  if (!isFileDrag(e)) return;
  e.preventDefault();
  bodyDragCounter = 0;
  document.getElementById('dropOverlay').classList.remove('active');
  if (document.getElementById('fileModal').classList.contains('active')) return;
  const fl = e.dataTransfer.files;
  if (!fl.length) return;
  uploadFilesDirectly(fl);
}

function uploadFilesDirectly(fileList) {
  const selected = Array.from(fileList);
  const tooBig = selected.filter(f => f.size > 20 * 1024 * 1024);
  if (tooBig.length) {
    showToast(tooBig.length + ' 个文件超过 20MB 限制：' + tooBig.map(f=>f.name).join(', '));
    return;
  }
  let loaded = 0;
  selected.forEach(file => {
    const reader = new FileReader();
    reader.onload = function(ev) {
      const data = ev.target.result;
      const id = 'fl_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
      localStorage.setItem(FILE_PREFIX + id, data);
      files.push({
        id,
        folderId: currentFolderId,
        name: file.name,
        type: file.name.split('.').pop().toLowerCase(),
        size: Math.round(data.length * 0.75),
        createdAt: Date.now()
      });
      loaded++;
      if (loaded === selected.length) {
        saveMeta();
        renderItems();
        showToast(loaded + ' 个文件已上传（草稿）');
      }
    };
    reader.readAsDataURL(file);
  });
}

// --- File-to-folder drag & drop ---
function dragFileStart(e, fileId) {
  e.dataTransfer.setData('text/plain', fileId);
  e.dataTransfer.effectAllowed = 'move';
  const card = e.target.closest('.item-card');
  if (card) setTimeout(() => card.classList.add('dragging'), 0);
}

function dragFileEnd(e) {
  const card = e.target.closest('.item-card');
  if (card) card.classList.remove('dragging');
  document.querySelectorAll('.item-card.drop-target').forEach(el => el.classList.remove('drop-target'));
}

function folderDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const card = e.target.closest('.item-card');
  if (card) card.classList.add('drop-target');
  else if (e.target.closest('#breadcrumb')) {
    e.target.classList.add('drop-target');
  }
}

function folderDragLeave(e) {
  const card = e.target.closest('.item-card');
  if (card) card.classList.remove('drop-target');
}

function folderDrop(e, folderId) {
  e.preventDefault();
  e.stopPropagation();
  // Remove highlight
  document.querySelectorAll('.item-card.drop-target').forEach(el => el.classList.remove('drop-target'));
  const fileId = e.dataTransfer.getData('text/plain');
  if (!fileId) return;
  const f = files.find(x => x.id === fileId);
  if (!f) return;
  f.folderId = folderId || null;
  saveMeta();
  renderItems();
  showToast('文件已移动（草稿）');
}

function gridDrop(e) {
  e.preventDefault();
  e.stopPropagation();
  document.querySelectorAll('.item-card.drop-target').forEach(el => el.classList.remove('drop-target'));
  const fileId = e.dataTransfer.getData('text/plain');
  if (!fileId) return;
  const f = files.find(x => x.id === fileId);
  if (!f) return;
  f.folderId = currentFolderId || null;
  saveMeta();
  renderItems();
  showToast('文件已移动到当前文件夹（草稿）');
}

// --- Modal-level drag ---
function dragOver(e) { e.preventDefault(); }

function dragEnter(e) {
  e.preventDefault();
  document.getElementById('fileUploadZone').classList.add('drag-over');
}

function dragLeave(e) {
  e.preventDefault();
  document.getElementById('fileUploadZone').classList.remove('drag-over');
}

function dropFile(e) {
  e.preventDefault();
  document.getElementById('fileUploadZone').classList.remove('drag-over');
  processFiles(e.dataTransfer.files);
}

function processFiles(fileList) {
  const selected = Array.from(fileList);
  if (!selected.length) return;
  // Check sizes
  const tooBig = selected.filter(f => f.size > 20 * 1024 * 1024);
  if (tooBig.length) {
    showToast(tooBig.length + ' 个文件超过 20MB 限制：' + tooBig.map(f=>f.name).join(', '));
    return;
  }
  // Read all files
  pendingFiles = [];
  let loaded = 0;
  selected.forEach(file => {
    const reader = new FileReader();
    reader.onload = function(ev) {
      pendingFiles.push({data: ev.target.result, name: file.name, size: file.size});
      loaded++;
      if (loaded === selected.length) {
        // All loaded
        const total = pendingFiles.reduce((s,f)=>s+f.size, 0);
        document.getElementById('selectedFileName').textContent = selected.length + ' 个文件 (' + fmtSize(total) + ')';
        document.getElementById('selectedFileName').style.display = '';
        document.getElementById('fileUploadZone').querySelector('.upload-placeholder').style.display = 'none';
        document.getElementById('fileUploadZone').classList.add('has-file');
        document.getElementById('uploadBtn').disabled = false;
      }
    };
    reader.readAsDataURL(file);
  });
}

function uploadFile() {
  if (!pendingFiles.length) return;
  pendingFiles.forEach(pf => {
    const id = 'fl_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
    localStorage.setItem(FILE_PREFIX + id, pf.data);
    files.push({
      id,
      folderId: currentFolderId,
      name: pf.name,
      type: pf.name.split('.').pop().toLowerCase(),
      size: Math.round(pf.data.length * 0.75),
      createdAt: Date.now()
    });
  });
  saveMeta();
  renderItems();
  closeFileModal();
  showToast(pendingFiles.length + ' 个文件已上传（草稿）');
}

function deleteFile(id) {
  if (!confirm('确定删除这个文件？')) return;
  files = files.filter(f => f.id !== id);
  localStorage.removeItem(FILE_PREFIX + id);
  saveMeta();
  renderItems();
  showToast('文件已删除（草稿）');
}

function downloadFile(id) {
  // Try local draft first
  const localData = localStorage.getItem(FILE_PREFIX + id);
  if (localData) {
    const f = files.find(x => x.id === id);
    const a = document.createElement('a');
    a.href = localData;
    a.download = f ? f.name : 'file';
    a.click();
    return;
  }
  // Try inline data field (legacy format)
  const f = files.find(x => x.id === id);
  if (f && f.data) {
    const a = document.createElement('a');
    a.href = f.data;
    a.download = f.name;
    a.click();
    return;
  }
  // Try server files/ directory
  if (f) {
    const a = document.createElement('a');
    a.href = 'files/' + encodeURIComponent(f.name);
    a.download = f.name;
    a.click();
    return;
  }
  showToast('文件不存在');
}

// --- Export ---
function exportData() {
  // 1. Save metadata JSON (no base64 data)
  const metaOnly = files.map(({data, ...rest}) => rest);
  const metaBlob = new Blob([JSON.stringify({folders, files: metaOnly}, null, 2)], {type:'application/json'});
  const metaUrl = URL.createObjectURL(metaBlob);
  const ma = document.createElement('a');
  ma.href = metaUrl; ma.download = 'data.json'; ma.click();
  URL.revokeObjectURL(metaUrl);

  // 2. Save each file blob individually
  let delay = 300;
  const localIds = files.map(f => f.id).filter(id => !!localStorage.getItem(FILE_PREFIX + id));

  if (localIds.length > 0) {
    showToast('正在下载 data.json 和 ' + localIds.length + ' 个文件...');
  }

  localIds.forEach((id, i) => {
    setTimeout(() => {
      const f = files.find(x => x.id === id);
      const data = localStorage.getItem(FILE_PREFIX + id);
      if (data && f) {
        const blob = dataURItoBlob(data);
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = f.name;
        a.click();
        URL.revokeObjectURL(url);
      }
    }, delay * (i + 1));
  });

  // 3. Mark as published
  serverSnapshot = JSON.stringify({folders, files});
  localStorage.setItem(META_KEY, JSON.stringify({folders, files}));
  updateBanner();
  document.getElementById('publishSteps').classList.add('show');

  if (localIds.length === 0) {
    showToast('data.json 已下载');
  }
}

function dataURItoBlob(dataURI) {
  const m = dataURI.match(/^data:(.*);base64,(.*)$/);
  if (!m) return new Blob([dataURI]);
  const bytes = atob(m[2]);
  const arr = new Uint8Array(bytes.length);
  for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
  return new Blob([arr], {type: m[1]});
}

// --- Utils ---
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function discardDraft() {
  if (!confirm('确定清除所有草稿，加载服务器版本？')) return;
  for (let i = localStorage.length - 1; i >= 0; i--) {
    const key = localStorage.key(i);
    if (key && (key.startsWith(FILE_PREFIX) || key === META_KEY)) {
      localStorage.removeItem(key);
    }
  }
  location.reload();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timeout);
  t._timeout = setTimeout(() => t.classList.remove('show'), 2500);
}

// Modal close
document.getElementById('folderModal').addEventListener('click', function(e) {
  if (e.target === this) closeFolderModal();
});
document.getElementById('fileModal').addEventListener('click', function(e) {
  if (e.target === this) closeFileModal();
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') { closeFolderModal(); closeFileModal(); }
});

// Init
(async function() {
  await loadData();
  renderItems();
  updateBanner();
})();
</script>
