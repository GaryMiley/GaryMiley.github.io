<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的作品集</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #fafafa;
  --card-bg: #fff;
  --text: #1a1a1a;
  --text-secondary: #666;
  --border: #e5e5e5;
  --accent: #2563eb;
  --accent-hover: #1d4ed8;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
  --shadow-lg: 0 10px 25px rgba(0,0,0,.08);
  --radius: 12px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(250,250,250,.85);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex; align-items: center; justify-content: space-between;
  height: 56px;
}
nav .logo { font-size: 1.25rem; font-weight: 700; color: var(--text); text-decoration: none; }
nav .nav-links { display: flex; gap: 24px; list-style: none; }
nav .nav-links a { color: var(--text-secondary); text-decoration: none; font-size: .9rem; transition: color .2s; }
nav .nav-links a:hover { color: var(--text); }

.hero {
  text-align: center;
  padding: 100px 24px 64px;
}
.hero .avatar {
  width: 100px; height: 100px; border-radius: 50%;
  background: linear-gradient(135deg, #2563eb, #7c3aed);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 2.5rem; color: #fff; margin-bottom: 24px;
  box-shadow: 0 8px 24px rgba(37,99,235,.25);
}
.hero h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 8px; letter-spacing: -.02em; }
.hero p { color: var(--text-secondary); font-size: 1.1rem; max-width: 480px; margin: 0 auto; }

.container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 32px; flex-wrap: wrap; gap: 12px;
}
.section-header h2 { font-size: 1.5rem; font-weight: 700; }

.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 10px 20px; border: none; border-radius: 8px;
  font-size: .875rem; font-weight: 500; cursor: pointer;
  transition: all .2s; text-decoration: none;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(37,99,235,.3); }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
.btn-outline:hover { background: #f5f5f5; }
.btn-danger { background: #ef4444; color: #fff; }
.btn-danger:hover { background: #dc2626; }
.btn-sm { padding: 6px 12px; font-size: .8rem; }

.projects-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 24px;
  margin-bottom: 80px;
}

.project-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: all .25s;
  box-shadow: var(--shadow);
}
.project-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
.project-card .card-img {
  width: 100%; height: 200px; object-fit: cover;
  display: block; background: #f0f0f0;
}
.project-card .card-img-placeholder {
  width: 100%; height: 200px;
  background: linear-gradient(135deg, #f0f4ff, #faf5ff);
  display: flex; align-items: center; justify-content: center;
  font-size: 3rem; color: #cbd5e1;
}
.project-card .card-body { padding: 20px; }
.project-card .card-body h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 6px; }
.project-card .card-body p { color: var(--text-secondary); font-size: .875rem; margin-bottom: 16px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.project-card .card-body .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
.project-card .card-body .tag {
  padding: 3px 10px; background: #f0f4ff; color: var(--accent);
  border-radius: 20px; font-size: .75rem; font-weight: 500;
}
.project-card .card-actions { display: flex; gap: 8px; }

.empty-state {
  text-align: center; padding: 64px 24px;
  color: var(--text-secondary);
}
.empty-state .empty-icon { font-size: 4rem; margin-bottom: 16px; }
.empty-state h3 { font-size: 1.25rem; margin-bottom: 8px; color: var(--text); }
.empty-state p { margin-bottom: 24px; }

/* Modal */
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,.4); backdrop-filter: blur(4px);
  align-items: center; justify-content: center; padding: 24px;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--card-bg); border-radius: var(--radius);
  width: 100%; max-width: 540px; max-height: 90vh; overflow-y: auto;
  box-shadow: var(--shadow-lg); padding: 32px;
}
.modal h3 { font-size: 1.25rem; margin-bottom: 24px; }
.form-group { margin-bottom: 20px; }
.form-group label { display: block; font-size: .875rem; font-weight: 500; margin-bottom: 6px; }
.form-group input,
.form-group textarea {
  width: 100%; padding: 10px 14px;
  border: 1px solid var(--border); border-radius: 8px;
  font-size: .9rem; font-family: inherit; outline: none;
  transition: border-color .2s; resize: vertical;
}
.form-group input:focus,
.form-group textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
.form-group textarea { min-height: 100px; }

.image-upload {
  border: 2px dashed var(--border); border-radius: var(--radius);
  padding: 32px; text-align: center; cursor: pointer;
  transition: all .2s; position: relative;
}
.image-upload:hover { border-color: var(--accent); background: #f8faff; }
.image-upload.has-image { border-style: solid; padding: 0; }
.image-upload img { width: 100%; height: 180px; object-fit: cover; border-radius: 10px; display: block; }
.image-upload .upload-text { color: var(--text-secondary); font-size: .875rem; }
.image-upload .upload-icon { font-size: 2rem; margin-bottom: 8px; }
.image-upload input[type="file"] { display: none; }

.modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 28px; }

/* Footer */
footer {
  text-align: center; padding: 32px 24px;
  color: var(--text-secondary); font-size: .85rem;
  border-top: 1px solid var(--border);
}

/* Toast */
.toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 300;
  background: #1a1a1a; color: #fff; padding: 12px 24px;
  border-radius: 8px; font-size: .875rem;
  transform: translateY(100px); opacity: 0; transition: all .3s;
}
.toast.show { transform: translateY(0); opacity: 1; }

@media (max-width: 640px) {
  .hero h1 { font-size: 1.75rem; }
  .projects-grid { grid-template-columns: 1fr; }
  nav .nav-links { gap: 16px; }
}
</style>
</head>
<body>

<nav>
  <a href="#" class="logo">Portfolio</a>
  <ul class="nav-links">
    <li><a href="#about">关于</a></li>
    <li><a href="#works">作品</a></li>
  </ul>
</nav>

<section class="hero">
  <div class="avatar" id="heroAvatar">W</div>
  <h1 id="heroName">你好，我是 Wayne</h1>
  <p id="heroBio">全栈开发者 / 设计师。这里是我的个人作品集，记录我做的项目和探索。</p>
</section>

<section class="container" id="works">
  <div class="section-header">
    <h2>我的作品</h2>
    <button class="btn btn-primary" onclick="openModal()">+ 添加作品</button>
  </div>
  <div class="projects-grid" id="projectsGrid"></div>
</section>

<section class="container" id="about" style="margin-bottom:80px">
  <div class="section-header"><h2>关于我</h2></div>
  <div style="max-width:640px;color:var(--text-secondary);line-height:1.8">
    <p>我是一名热爱技术的全栈开发者，专注于 Web 开发和用户体验设计。这里展示了我参与和主导的一些项目。如果你对我的工作感兴趣，欢迎联系。</p>
  </div>
</section>

<footer><p>© 2026 Wayne's Portfolio</p></footer>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">添加作品</h3>
    <div class="form-group">
      <label>作品标题</label>
      <input type="text" id="projectTitle" placeholder="输入作品名称">
    </div>
    <div class="form-group">
      <label>描述</label>
      <textarea id="projectDesc" placeholder="简要描述这个作品"></textarea>
    </div>
    <div class="form-group">
      <label>标签（用逗号分隔）</label>
      <input type="text" id="projectTags" placeholder="例如: React, TypeScript, UI设计">
    </div>
    <div class="form-group">
      <label>封面图片</label>
      <div class="image-upload" id="imageUpload" onclick="document.getElementById('fileInput').click()">
        <div class="upload-placeholder">
          <div class="upload-icon">📷</div>
          <div class="upload-text">点击上传图片</div>
        </div>
        <img id="previewImg" style="display:none" alt="预览">
      </div>
      <input type="file" id="fileInput" accept="image/*" onchange="handleImageSelect(event)">
      <button type="button" class="btn btn-outline btn-sm" style="margin-top:8px" onclick="event.stopPropagation();clearImage()" id="clearImgBtn" disabled>清除图片</button>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveProject()" id="saveBtn">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'portfolio_projects';
let projects = [];
let editingId = null;
let tempImageData = null;

function loadProjects() {
  try { projects = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch (e) { projects = []; }
}

function saveProjects() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(projects));
}

function renderProjects() {
  const grid = document.getElementById('projectsGrid');
  if (projects.length === 0) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <div class="empty-icon">📂</div>
        <h3>还没有作品</h3>
        <p>点击上方按钮添加你的第一个作品吧</p>
      </div>`;
    return;
  }
  grid.innerHTML = projects.map((p, i) => `
    <div class="project-card">
      ${p.image
        ? `<img class="card-img" src="${p.image}" alt="${escapeHtml(p.title)}">`
        : `<div class="card-img-placeholder">📁</div>`}
      <div class="card-body">
        <h3>${escapeHtml(p.title)}</h3>
        <p>${escapeHtml(p.desc)}</p>
        ${p.tags.length ? `<div class="tags">${p.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>` : ''}
        <div class="card-actions">
          <button class="btn btn-outline btn-sm" onclick="editProject('${p.id}')">编辑</button>
          <button class="btn btn-danger btn-sm" onclick="deleteProject('${p.id}')">删除</button>
        </div>
      </div>
    </div>
  `).join('');
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function openModal(id) {
  editingId = id || null;
  tempImageData = null;
  document.getElementById('modalTitle').textContent = id ? '编辑作品' : '添加作品';
  document.getElementById('saveBtn').textContent = id ? '更新' : '保存';

  if (id) {
    const p = projects.find(x => x.id === id);
    if (p) {
      document.getElementById('projectTitle').value = p.title;
      document.getElementById('projectDesc').value = p.desc;
      document.getElementById('projectTags').value = p.tags.join(', ');
      tempImageData = p.image || null;
      updateImagePreview();
    }
  } else {
    document.getElementById('projectTitle').value = '';
    document.getElementById('projectDesc').value = '';
    document.getElementById('projectTags').value = '';
    tempImageData = null;
    updateImagePreview();
  }
  document.getElementById('modalOverlay').classList.add('active');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  editingId = null;
  tempImageData = null;
}

function handleImageSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    tempImageData = ev.target.result;
    updateImagePreview();
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

function clearImage() {
  tempImageData = null;
  updateImagePreview();
}

function updateImagePreview() {
  const upload = document.getElementById('imageUpload');
  const placeholder = upload.querySelector('.upload-placeholder');
  const img = document.getElementById('previewImg');
  const clearBtn = document.getElementById('clearImgBtn');
  if (tempImageData) {
    placeholder.style.display = 'none';
    img.src = tempImageData;
    img.style.display = 'block';
    upload.classList.add('has-image');
    clearBtn.disabled = false;
  } else {
    placeholder.style.display = '';
    img.style.display = 'none';
    img.src = '';
    upload.classList.remove('has-image');
    clearBtn.disabled = true;
  }
}

function saveProject() {
  const title = document.getElementById('projectTitle').value.trim();
  const desc = document.getElementById('projectDesc').value.trim();
  const tagsStr = document.getElementById('projectTags').value.trim();

  if (!title) { showToast('请输入作品标题'); return; }

  const tags = tagsStr ? tagsStr.split(',').map(t => t.trim()).filter(Boolean) : [];

  if (editingId) {
    const p = projects.find(x => x.id === editingId);
    if (p) {
      p.title = title;
      p.desc = desc;
      p.tags = tags;
      p.image = tempImageData || '';
    }
  } else {
    projects.unshift({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2, 7),
      title, desc, tags,
      image: tempImageData || '',
      createdAt: Date.now()
    });
  }

  saveProjects();
  renderProjects();
  closeModal();
  showToast(editingId ? '作品已更新' : '作品已添加');
}

function editProject(id) {
  openModal(id);
}

function deleteProject(id) {
  if (!confirm('确定要删除这个作品吗？')) return;
  projects = projects.filter(p => p.id !== id);
  saveProjects();
  renderProjects();
  showToast('作品已删除');
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(() => toast.classList.remove('show'), 2000);
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

// Init
loadProjects();
renderProjects();
</script>

</body>
</html>
